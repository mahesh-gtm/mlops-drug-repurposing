name: Daily GNN Retraining

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes for testing
  workflow_dispatch:        # Manual trigger
  push:
    branches:
      - main

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # === FIXED COMMANDS BELOW (using python -m) ===
      - name: Ingest real GDSC data
        run: python -m src.ingestion.data_ingest

      - name: Build heterogeneous knowledge graph
        run: python -m src.preprocessing.build_graph

      - name: Train GNN model
        run: python -m src.training.train_gnn

      - name: Show summary
        run: |
          echo "✅ Daily retraining completed successfully"
          ls -la artifacts/